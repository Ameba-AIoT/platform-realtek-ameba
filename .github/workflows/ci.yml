name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================================
  # Layer 1: lint (~10s, fast feedback)
  # =========================================================================
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install --quiet ruff

      - name: Run lint
        shell: bash
        run: ./tests/lint.sh

  # =========================================================================
  # Layer 2a: Python unit tests (~1 min, mock-based, no SDK needed)
  # =========================================================================
  unit:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install --quiet pytest pytest-mock

      - name: Run unit tests
        # cd into tests/ to dodge the platform.py-vs-stdlib-platform name
        # collision. (Importing pytest pulls in stdlib `platform`, which
        # python's resolution finds our platform.py first if cwd is repo root.)
        shell: bash
        env:
          PYTHONUTF8: "1"  # belt-and-suspenders for Windows cp1252 default
        run: |
          cd tests
          python -m pytest unit/ -v

  # =========================================================================
  # Prefetch SDK + toolchain ONCE so the integration matrix below reuses the
  # same cache across all 3 boards. Without this, each matrix job would
  # cold-clone the SDK + per-SoC toolchain independently.
  #
  # CI verifies the BASE SDK only (AMEBA_SDK_EDITION=sdk, ~100 MB download / ~440 MB on disk). A cold run
  # is ~5 min for the SDK plus the per-family toolchains, but only ONCE per
  # platform.json/platform.py change. Subsequent matrix jobs hit the cache
  # in seconds. The ~1.1 GB XDK edition (AI / tflite / UI / audio) will get
  # its own job once its submodules are slimmed down.
  # =========================================================================
  prefetch:
    name: Prefetch SDK + toolchain
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO Core
        run: pip install --quiet --upgrade platformio

      - name: Cache SDK + toolchain
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages/framework-ameba-rtos
            ~/rtk-toolchain
          key: ameba-sdk-toolchain-${{ runner.os }}-${{ hashFiles('platform.json', 'platform.py') }}
          restore-keys: |
            ameba-sdk-toolchain-${{ runner.os }}-

      - name: Install platform globally
        if: steps.cache.outputs.cache-hit != 'true'
        run: pio pkg install -g -p "file://$GITHUB_WORKSPACE"

      # Cold-cache populate: trigger a probe build for each board so all
      # required toolchains land in ~/rtk-toolchain. Each board uses a
      # different toolchain family (amebadplus/amebagreen2/amebalite),
      # so we must touch all 3 to populate fully.
      - name: Populate cache (cold only)
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          # Verify the base SDK only. XDK gets a dedicated job later.
          AMEBA_SDK_EDITION: sdk
        run: |
          set -e
          for board in pke8721daf-c13-f10 pke8710ecf-c53-f20 pke8713ecm-va4-n43; do
            echo "=== Probe build for $board (toolchain prefetch) ==="
            PROJ=$(mktemp -d -t prefetch-$board-XXXXXX)
            mkdir -p "$PROJ/src"
            cat > "$PROJ/platformio.ini" <<EOF
          [env:$board]
          platform = realtek-ameba
          framework = ameba-rtos
          board = $board
          EOF
            (cd "$PROJ" && pio run -e "$board" 2>&1 | tail -20) || \
              echo "WARN: probe build for $board hit issues (cache may be partial)"
          done

      - name: Show cache size
        run: |
          du -sh ~/.platformio/packages/framework-ameba-rtos 2>/dev/null || true
          du -sh ~/rtk-toolchain 2>/dev/null || true

  # =========================================================================
  # Layer 2b: integration tests (~30s warm per board, runs in parallel)
  #
  # Depends on prefetch — the cache is guaranteed populated by the time
  # we get here, so each matrix job reuses the same SDK + toolchain.
  # =========================================================================
  integration:
    name: Integration (${{ matrix.board }} / ${{ matrix.test }})
    runs-on: ubuntu-latest
    needs: prefetch
    strategy:
      fail-fast: false
      matrix:
        board:
          - pke8721daf-c13-f10
          - pke8710ecf-c53-f20
          - pke8713ecm-va4-n43
        test:
          - 01_install
          - 02_first_build
          - 03_incremental
          - 04_clean
          - 05_buildfs
        # More integration scripts get added here as they land:
        # 07_venv_resync, 08_sdk_upgrade, 09_invalid_inputs, ...
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO Core
        run: |
          pip install --quiet --upgrade platformio
          pio --version

      # Restore the cache populated by the prefetch job. Same key —
      # since prefetch ran first and populated, this should always hit.
      - name: Restore SDK + toolchain cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages/framework-ameba-rtos
            ~/rtk-toolchain
          key: ameba-sdk-toolchain-${{ runner.os }}-${{ hashFiles('platform.json', 'platform.py') }}
          restore-keys: |
            ameba-sdk-toolchain-${{ runner.os }}-

      - name: Run integration test ${{ matrix.test }}
        env:
          TEST_BOARD: ${{ matrix.board }}
          PLATFORM_PATH: ${{ github.workspace }}
          # Base SDK only (defensive: matters if the cache ever misses and
          # `pio run` re-clones). XDK is verified in a separate job later.
          AMEBA_SDK_EDITION: sdk
        run: ./tests/integration/${{ matrix.test }}.sh

      # Surface the install log on failure for debugging
      - name: Dump install log on failure
        if: failure()
        run: |
          if [ -d /tmp/pio-install-* ]; then
            for d in /tmp/pio-install-*; do
              if [ -f "$d/install.log" ]; then
                echo "=== $d/install.log (last 60 lines) ==="
                tail -60 "$d/install.log"
              fi
            done
          fi

  # =========================================================================
  # Layer 2c: compile every shipped example (keeps examples/ from rotting).
  #
  # Reuses the SDK + toolchain cache populated by prefetch, so each example
  # is a warm build (~60s). One matrix entry per example; `pio run -d`
  # builds every env declared in that example's platformio.ini.
  # =========================================================================
  examples:
    name: Example build (${{ matrix.os }} / ${{ matrix.example }})
    runs-on: ${{ matrix.os }}
    needs: prefetch
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        example:
          - ameba-blink
          - ameba-wifi-connect
          - ameba-mqtt
          - ameba-http-client
        include:
          # Windows: cold-build one example to exercise the mingw32 toolchain
          # path end-to-end. (No Windows prefetch cache yet, so this clones
          # the SDK + fetches the Windows toolchain from scratch.)
          - os: windows-latest
            example: ameba-blink
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO Core
        run: pip install --quiet --upgrade platformio

      - name: Install platform globally
        shell: bash
        run: pio pkg install -g -p "symlink://."

      - name: Restore SDK + toolchain cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages/framework-ameba-rtos
            ~/rtk-toolchain
          key: ameba-sdk-toolchain-${{ runner.os }}-${{ hashFiles('platform.json', 'platform.py') }}
          restore-keys: |
            ameba-sdk-toolchain-${{ runner.os }}-

      - name: Build example
        shell: bash
        env:
          # Base SDK only (matches prefetch); XDK gets its own job later.
          AMEBA_SDK_EDITION: sdk
        run: pio run -d "examples/${{ matrix.example }}"
