; ameba-wifi-connect — connect to a Wi-Fi AP (STA mode) + DHCP + auto-reconnect.
;
; Edit your AP credentials in src/wifi_connect.c (WIFI_SSID / WIFI_PASSWORD),
; then:
;     pio run                 # build
;     pio run -t upload       # flash
;     pio device monitor      # watch the join status log
;
; This is the foundation for the network examples (MQTT, HTTP, TCP...):
; bring Wi-Fi up here first, then layer a protocol on top.

[env:pke8721daf-c13-f10]
platform  = realtek-ameba
framework = ameba-rtos
board     = pke8721daf-c13-f10

; Serial port is auto-detected for a single board. Uncomment to pin it:
; upload_port  = /dev/ttyUSB0
; monitor_port = /dev/ttyUSB0
; monitor_speed = 1500000
