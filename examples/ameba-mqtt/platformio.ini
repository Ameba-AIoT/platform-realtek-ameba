; ameba-mqtt — connect Wi-Fi (STA) then run an MQTT pub/sub demo.
;
; Configure before flashing:
;   - Wi-Fi credentials in src/wifi_connect.c (WIFI_SSID / WIFI_PASSWORD)
;   - Broker / topics      in src/mqtt_client.c
;
; Then:
;     pio run                 # build
;     pio run -t upload       # flash
;     pio device monitor      # watch the MQTT log
;
; By default it talks to the public broker.emqx.io test broker. Use an MQTT
; client (e.g. MQTTX) subscribed to "ameba/pio/demo/#" to see the messages.

[env:pke8721daf-c13-f10]
platform  = realtek-ameba
framework = ameba-rtos
board     = pke8721daf-c13-f10

; Serial port is auto-detected for a single board. Uncomment to pin it:
; upload_port  = /dev/ttyUSB0
; monitor_port = /dev/ttyUSB0
; monitor_speed = 1500000
