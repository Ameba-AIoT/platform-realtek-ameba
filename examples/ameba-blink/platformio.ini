[env:pke8721daf-c13-f10]
platform = realtek-ameba
framework = ameba-rtos
board = pke8721daf-c13-f10

; ─── RTL8713E test board (USB serial @ /dev/ttyUSB0 via usbipd-win) ──────
; Used for verifying erase / upload / debug / buildfs targets on real hw.
; Source code is shared with the RTL8721 env; the GPIO pin in src/main.c
; may not light up an LED on the 8713 dev board, but the build/flash/log
; pipeline is what we care about here.
[env:pke8713ecm-va4-n43]
platform     = realtek-ameba
framework    = ameba-rtos
board        = pke8713ecm-va4-n43
upload_port  = /dev/ttyUSB0
upload_speed = 1500000
monitor_port  = /dev/ttyUSB0
monitor_speed = 1500000

; User code goes in src/ — platform-realtek-ameba auto-bridges it into the
; SDK's app_example library on each build. You may also edit
; app_example/app_main.c directly if you prefer the SDK-native layout.

; ─── Upload (optional overrides) ─────────────────────────────────────────
; upload_port = /dev/ttyUSB0           ; auto-detected if omitted
; board_upload.memory_type = nor       ; nor (default) | flash
; board_upload.chip_erase  = no        ; yes → full chip erase before flash

; ─── Serial monitor (optional overrides) ─────────────────────────────────
; monitor_port  = /dev/ttyUSB0         ; auto-detected if omitted
; monitor_speed = 1500000              ; preset on the board manifest
; monitor_filters = direct, time

; ─── Extra build flags (pass-through to SDK cmake EXTRA_CFLAGS) ──────────
; build_flags = -DMY_FEATURE=1 -DLOG_LEVEL=4
