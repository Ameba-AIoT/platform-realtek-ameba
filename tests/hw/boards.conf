# tests/hw/boards.conf — board → serial-port map for the hardware smoke
# layer (`./tests/run.sh hw`).
#
# EDIT THIS FILE for your bench: one line per board,
#     <board_id>            <serial_port>     [baud]
# `run.sh hw` runs every tests/hw/NN_*.sh against EACH board listed here.
# Adding a board is one line — no test-script changes needed.
# Lines starting with # are ignored; baud defaults to 1500000.
# A board whose port isn't present is skipped (not flashed).
#
# Tip (WSL + usbipd): after `usbipd attach`, each board shows up as its own
# /dev/ttyUSB*. Run `pio device list` to see which is which.

pke8713ecm-va4-n43    /dev/ttyUSB0    1500000
